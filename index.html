<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang Khoi Dep Trai No 1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
         :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .option-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            border: none;
            cursor: pointer;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            transition: 0.3s;
        }
        
        .option-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }
        
        .sound-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 50px;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 34px;
        }
        
        input:checked+.slider {
            background-color: #22c55e;
        }
        
        .correct {
            background: #22c55e !important;
            box-shadow: 0 0 15px #22c55e;
        }
        
        .wrong {
            background: #ef4444 !important;
            box-shadow: 0 0 15px #ef4444;
        }
        
        input[type="number"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            color: white;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 12px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="sound-control">
            <span>🔊 Âm thanh</span>
            <label class="switch">
                <input type="checkbox" id="soundToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div id="app">
            <h2>Thiết lập bài học</h2>
            <input type="number" id="start" placeholder="Từ (ID)">
            <input type="number" id="end" placeholder="Đến (ID)">
            <button class="option-btn" onclick="startQuiz()">Bắt đầu học</button>
        </div>
    </div>

    <audio id="sound-correct" src="correct.mp3"></audio>
    <audio id="sound-wrong" src="wrong.mp3"></audio>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2agRGf989njIz6Tuzr_oTWxIZFBF4z3ohlsXG3_fH8gAMtB0ITw_wY-BTLOVk1knW4UX9D_S0uu_f/pub?gid=0&single=true&output=csv";
        let allData = [],
            quizData = [],
            currentIndex = 0,
            score = 0;

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            complete: (res) => {
                allData = res.data.filter(i => i.id);
            }
        });

        function playSound(isCorrect) {
            if (!document.getElementById("soundToggle").checked) return;
            const sound = document.getElementById(isCorrect ? "sound-correct" : "sound-wrong");
            if (sound) {
                sound.currentTime = 0;
                sound.play();
            }
        }

        function startQuiz() {
            quizData = allData.filter(i => parseInt(i.id) >= document.getElementById("start").value && parseInt(i.id) <= document.getElementById("end").value);
            if (quizData.length === 0) return alert("Không có dữ liệu!");
            currentIndex = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = quizData[currentIndex];
            document.getElementById("app").innerHTML = `<h3>"${q.word}" nghĩa là gì?</h3><div id="options-box"></div>`;
            const options = [...q.wrong.split(','), q.correct].sort(() => 0.5 - Math.random());
            options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => {
                    const isCorrect = (opt === q.correct);
                    playSound(isCorrect);
                    btn.classList.add(isCorrect ? "correct" : "wrong");
                    document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = "none");
                    if (isCorrect) score++;

                    const nextBtn = document.createElement("button");
                    nextBtn.innerText = "Tiếp theo";
                    nextBtn.className = "option-btn";
                    nextBtn.style.background = "#6366f1";
                    nextBtn.onclick = () => {
                        currentIndex++;
                        currentIndex < quizData.length ? showQuestion() : (document.getElementById("app").innerHTML = `<h2>Kết quả: ${score}/${quizData.length}</h2><button class="option-btn" onclick="location.reload()">Làm lại</button>`);
                    };
                    document.getElementById("app").appendChild(nextBtn);
                };
                document.getElementById("options-box").appendChild(btn);
            });
        }
    </script>
</body>

</html>
