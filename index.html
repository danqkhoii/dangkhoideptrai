<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang Khoi Dep Trai No 1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            background: white;
            padding: 40px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 600px;
            text-align: center;
            border-radius: 16px;
        }
        
        .option-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            border: 2px solid #ddd;
            cursor: pointer;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            background: white;
            transition: 0.2s;
        }
        
        .option-btn:hover {
            background: #f0f0f0;
        }
        /* Cài đặt nút gạt âm thanh */
        
        .settings-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .sound-control {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: #f8f9fa;
            border-radius: 50px;
            border: 1px solid #e0e0e0;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked+.slider {
            background-color: #2ecc71;
        }
        
        input:checked+.slider:before {
            transform: translateX(24px);
        }
        
        .correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60;
            pointer-events: none;
        }
        
        .wrong {
            background-color: #e74c3c !important;
            color: white;
            border-color: #c0392b;
            pointer-events: none;
        }
        
        input[type="number"] {
            padding: 15px;
            width: 90%;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 2px solid #ccc;
            font-size: 18px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="settings-container">
            <div class="sound-control">
                <span>🔊 Âm thanh</span>
                <label class="switch">
                <input type="checkbox" id="soundToggle" checked>
                <span class="slider"></span>
            </label>
            </div>
        </div>
        <div id="app">
            <div id="setup-screen">
                <h2>Thiết lập bài học</h2>
                <input type="number" id="start" placeholder="Từ (ID)">
                <input type="number" id="end" placeholder="Đến (ID)">
                <button class="option-btn" style="background:#27ae60; color:white;" onclick="startQuiz()">Bắt đầu học</button>
            </div>
        </div>
    </div>

    <audio id="sound-correct" src="correct.mp3"></audio>
    <audio id="sound-wrong" src="wrong.mp3"></audio>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR2agRGf989njIz6Tuzr_oTWxIZFBF4z3ohlsXG3_fH8gAMtB0ITw_wY-BTLOVk1knW4UX9D_S0uu_f/pub?gid=0&single=true&output=csv";
        let allData = [],
            quizData = [],
            currentIndex = 0,
            score = 0;

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            complete: (results) => {
                allData = results.data.filter(i => i.id);
            }
        });

        function playSound(isCorrect) {
            if (!document.getElementById("soundToggle").checked) return;
            const sound = document.getElementById(isCorrect ? "sound-correct" : "sound-wrong");
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Âm thanh bị chặn"));
            }
        }

        function startQuiz() {
            quizData = allData.filter(i => parseInt(i.id) >= document.getElementById("start").value && parseInt(i.id) <= document.getElementById("end").value);
            if (quizData.length === 0) return alert("Không có dữ liệu!");
            currentIndex = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = quizData[currentIndex];
            document.getElementById("app").innerHTML = `<h3>"${q.word}" nghĩa là gì?</h3><div id="options-box"></div>`;
            const options = [...q.wrong.split(','), q.correct].sort(() => 0.5 - Math.random());
            options.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => {
                        b.disabled = true;
                        b.style.pointerEvents = "none";
                    });
                    const isCorrect = (opt === q.correct);
                    playSound(isCorrect);
                    if (isCorrect) {
                        btn.classList.add("correct");
                        score++;
                    } else btn.classList.add("wrong");

                    const nextBtn = document.createElement("button");
                    nextBtn.innerText = "Tiếp theo";
                    nextBtn.className = "option-btn";
                    nextBtn.style.background = "#3498db";
                    nextBtn.style.color = "white";
                    nextBtn.onclick = () => {
                        currentIndex++;
                        currentIndex < quizData.length ? showQuestion() : (document.getElementById("app").innerHTML = `<h2>Kết quả: ${score}/${quizData.length}</h2><button class="option-btn" onclick="location.reload()">Làm lại</button>`);
                    };
                    document.getElementById("app").appendChild(nextBtn);
                };
                document.getElementById("options-box").appendChild(btn);
            });
        }
    </script>
</body>

</html>
